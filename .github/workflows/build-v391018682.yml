name: Build SesliOfis v391018682 package

on:
  push:
    paths:
      - 'build/v391018682/**'
      - '.github/workflows/build-v391018682.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build root-ready ZIP
        run: |
          set -euo pipefail
          mkdir -p dist
          PACKAGE='sesliofis-v3.9.10.186.8.2-app-tedarikci-popup-fixed-header-mobil-tasma-fix-degisen-dosyalar.zip'
          rm -f "dist/$PACKAGE" "dist/$PACKAGE.sha256"
          cd build/v391018682/package
          zip -q -r "../../../dist/$PACKAGE" .
          cd ../../..
          sha256sum "dist/$PACKAGE" > "dist/$PACKAGE.sha256"
      - name: Commit package artifacts
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add dist/
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Build SesliOfis v3.9.10.186.8.2 package'
          git push
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sesliofis-v3.9.10.186.8.2-package
          path: |
            dist/sesliofis-v3.9.10.186.8.2-app-tedarikci-popup-fixed-header-mobil-tasma-fix-degisen-dosyalar.zip
            dist/sesliofis-v3.9.10.186.8.2-app-tedarikci-popup-fixed-header-mobil-tasma-fix-degisen-dosyalar.zip.sha256
          if-no-files-found: error
